name: Sync upstream
on:
  schedule:
    - cron: '3 3 6 * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.UPSTREAMFORK }} 
      - name: Sync upstream
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/perfect-panel/subscription-template.git
          git fetch upstream
          git checkout main
          git merge upstream/main
          git push
